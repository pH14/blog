repos:
  # Zola validation (build check + internal links)
  - repo: local
    hooks:
      - id: zola-check
        name: zola check
        entry: zola check
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["content/**/*.md"]

  # HTML/CSS formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [html, css]
        args: ["--tab-width", "4"]

  # CSS linting (best practices + accessibility)
  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v16.12.0
    hooks:
      - id: stylelint
        args: ["--fix"]
        types_or: [html, css]
        additional_dependencies:
          - stylelint@16.12.0
          - stylelint-config-standard@38.0.0
          - postcss-html@1.8.0

  # Accessibility check on built site
  - repo: local
    hooks:
      - id: pa11y
        name: pa11y accessibility check
        entry: bash -c 'zola build && pa11y-ci --config .pa11yci.json'
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
