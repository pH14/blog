<style>
    /* light mode colors */
    body {
        --primary-color: #5871a2;
        --primary-pale-color: #5871a233;
        --primary-decoration-color: #5871a210;
        --bg-color: #ffffff;
        --text-color: #2f3030;
        --text-pale-color: #767676;
        --text-decoration-color: #a9a9a9;
        --highlight-mark-color: #5f75b020;

        --callout-note-color: #5871a2;
        --callout-tip-color: #268556;
        --callout-important-color: #885fc9;
        --callout-warning-color: #ab6632;
        --callout-caution-color: #c64e4e;
    }

    /* dark mode colors */
    body.dark {
        --primary-color: #6f8fd1;
        --primary-pale-color: #6f8fd166;
        --primary-decoration-color: #6f8fd112;
        --bg-color: #1c1c1c;
        --text-color: #c1c1c1;
        --text-pale-color: #848484;
        --text-decoration-color: #5f5f5f;
        --highlight-mark-color: #8296cb3b;

        --callout-note-color: #6f8fd1;
        --callout-tip-color: #47976f;
        --callout-important-color: #9776cd;
        --callout-warning-color: #ad7a52;
        --callout-caution-color: #d06161;
    }

    /* typography */
    body {
        --main-font: "Lora", Georgia, "Times New Roman", serif;
        --code-font:
            ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
            "Liberation Mono", "Courier New", monospace;
        --homepage-max-width: 768px;
        --main-max-width: 840px;
        --avatar-size: 160px;
        --font-size: 18px;
        --line-height: 1.75;
        --img-border-radius: 0px;
        --detail-border-radius: 0px;
        --dark-mode-img-brightness: 0.75;
        --dark-mode-chart-brightness: 0.75;
        --inline-code-border-radius: 2px;
        --inline-code-bg-color: var(--primary-decoration-color);
        --block-code-border-radius: 0px;
        --block-code-border-color: var(--primary-color);
        --detail-border-color: var(--primary-color);
    }

    /* ----- External link posts ----- */

    .external-post {
        opacity: 0.85;
    }

    .external-source {
        font-style: italic;
        font-size: 0.85em;
        opacity: 0.7;
    }

    /* ----- Sidenotes (Tufte-style) ----- */

    .prose {
        counter-reset: sidenote-counter;
    }

    .sidenote-number {
        counter-increment: sidenote-counter;
        cursor: pointer;
    }

    .sidenote-number::after {
        content: counter(sidenote-counter);
        vertical-align: super;
        font-size: 0.7em;
        line-height: 0;
        color: var(--primary-color);
    }

    input.margin-toggle {
        display: none;
    }

    .sidenote p {
        display: inline;
        margin: 0;
    }

    .sidenote::before {
        content: counter(sidenote-counter);
        font-size: 0.7em;
        vertical-align: super;
        line-height: 0;
        color: var(--primary-color);
        margin-right: 0.3em;
    }

    /* Desktop: sidenotes in the right margin */
    @media (min-width: 1100px) {
        .sidenote {
            display: block;
            float: right;
            clear: right;
            width: 220px;
            margin-right: -260px;
            font-size: 0.82rem;
            line-height: 1.5;
            color: var(--text-pale-color);
            vertical-align: baseline;
            position: relative;
        }
    }

    /* Mobile: always visible as inline paragraph */
    @media (max-width: 1099px) {
        .sidenote {
            display: block;
            float: none;
            clear: both;
            width: 100%;
            margin: 0.75rem 0;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.55;
            color: var(--text-pale-color);
            border-left: 3px solid var(--primary-pale-color);
            background: var(--primary-decoration-color);
        }
    }
</style>
